<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sajilo Softwares Survey Form</title>
    <link rel="stylesheet" href="form.css">
</head>

<body>

    <h2>Sajilo Softwares Feedback Form</h2>

    <form>

        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" required> <br><br>

        <label for="role">Which option describes you?</label><br>
        <select id="role" name="role">
            <option value="intern">Intern</option>
            <option value="trainee">Trainee</option>
            <option value="employee">Employee</option>
        </select>
        <br><br>


        <label>Would you recommend Sajilo Softwares to your friend?</label><br>

        <input type="radio" id="yes" name="recommend" value="Yes">
        <label for="yes">Yes</label><br>

        <input type="radio" id="no" name="recommend" value="No">
        <label for="no">No</label><br>

        <input type="radio" id="maybe" name="recommend" value="Maybe">
        <label for="maybe">Maybe</label> <br><br>

        <label>Languages or Frameworks you have used:</label><br>

        <input type="checkbox" id="c" name="language" value="C">
        <label for="c">C</label><br>

        <input type="checkbox" id="cpp" name="language" value="C++">
        <label for="cpp">C++</label><br>

        <input type="checkbox" id="html" name="language" value="HTML">
        <label for="html">HTML</label><br>

        <input type="checkbox" id="css" name="language" value="CSS">
        <label for="css">CSS</label><br>

        <input type="checkbox" id="python" name="language" value="Python">
        <label for="python">Python</label><br>

        <input type="checkbox" id="ruby" name="language" value="Ruby">
        <label for="ruby">Ruby</label><br>

        <input type="checkbox" id="rust" name="language" value="Rust">
        <label for="rust">Rust</label><br>

        <input type="checkbox" id="javascript" name="language" value="JavaScript">
        <label for="javascript">JavaScript</label><br>

        <input type="checkbox" id="react" name="language" value="React.js">
        <label for="react">React.js</label><br>

        <input type="checkbox" id="node" name="language" value="Node.js">
        <label for="node">Node.js</label><br>

        <input type="checkbox" id="laravel" name="language" value="Laravel">
        <label for="laravel">Laravel</label>
        <br><br>


        <label for="comments">Any comment or suggestion:</label><br>
        <textarea id="comments" name="comments" rows="5" cols="40"></textarea>
        <br><br>

        <input type="submit" value="Submit">

    </form>

</body>

</html>
