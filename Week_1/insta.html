<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Profile Clone</title>
    <link rel="stylesheet" href="insta.css">
</head>

<body>

    <div class="profile-container">

        <div class="top-bar">
            <span>＋</span>
            <h4>sumit.pkhrl</h4>
            <span>☰</span>
        </div>

        <div class="profile-header">

            <div class="profile-left">
                <img src="image.png" alt="Profile Picture" class="profile-pic">
            </div>

            <div class="profile-right">
                <h3 class="name">Sumit Pokharel</h3>
                <div class="profile-stats">
                    <div>
                        <strong>12</strong>
                        <p>posts</p>
                    </div>
                    <div>
                        <strong>1.4M</strong>
                        <p>followers</p>
                    </div>

                    <div>
                        <strong>10</strong>
                        <p>following</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bio">
            <p>Visca Barca 💙❤️</p>
            <p>@fcbarcelona</p>
        </div>

        <div class="buttons">
            <button class="main-btn">Edit Profile</button>
            <button class="main-btn">Share Profile</button>
            <button class="add-btn">👤+</button>
        </div>

        <div class="highlights">

            <div>
                <div class="circle"></div>
                <p>IIC</p>
            </div>

            <div>
                <div class="circle"></div>
                <p>Messi</p>
            </div>

            <div>
                <div class="circle"></div>
                <p>Ilam</p>
            </div>

        </div>

        <div class="tabs">
            <span>▦</span>
            <span>▶</span>
            <span>⟲</span>
            <span>👥</span>
        </div>

        <div class="post-grid">
            <img src="image.png" alt="">
            <img src="https://www.investopedia.com/thmb/ckPwC5ARwco1nOSCKVGE57se8MI=/1500x0/filters:no_upscale():max_bytes(150000):strip_icc()/GettyImages-1245748917-99e3329a7b8147e8ab648806220ce153.jpg" alt="">
            <img src="image.png" alt="">
            <img src="https://cdn.britannica.com/97/289697-050-9A3FE7AF/Lionel-Messi-10-Argentina-Celebrates-FIFA-World-Cup-2026-Group-J-Argentina-Algeria-Kansas-City-Stadium.jpg?w=400&h=300&c=crop" alt="">
            <img src="image.png" alt="">
            <img src="https://www.aljazeera.com/wp-content/uploads/2025/11/AP25315509151408-1762959845.jpg?resize=1920%2C1440" alt="">
        </div>
    </div>
</body>

</html>
